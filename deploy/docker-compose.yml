version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    container_name: kiosko-mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - kiosko_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: kiosko-backend
    env_file:
      - ../backend/.env
    depends_on:
      - mongo
    networks:
      - kiosko_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: kiosko-frontend
    depends_on:
      - backend
    networks:
      - kiosko_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    container_name: kiosko-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - kiosko_net

volumes:
  mongo_data:

networks:
  kiosko_net:
    driver: bridge
